<form action="#" method="POST">

    <div class="row">
        <input type="text" placeholder="First name" required>
        <input type="text" placeholder="Surname" required>
    </div>

    <!-- ✅ New ID Number Field -->
    <input type="text" placeholder="ID Number" required>

    <input type="email" placeholder="Mobile number or email" required>
    <input type="password" placeholder="New password" required>

    <!-- ✅ New Country Field -->
    <label>Country</label>
    <select required>
        <option value="">Select Country</option>
        <option>Kuwait</option>
        <option>Egypt</option>
        <option>Saudi Arabia</option>
        <option>UAE</option>
        <option>USA</option>
        <option>UK</option>
    </select>

    <label>Date of birth</label>
    <div class="row">
        <select>
            <option>Day</option>
            <option>1</option>
            <option>2</option>
        </select>
        <select>
            <option>Month</option>
            <option>Jan</option>
            <option>Feb</option>
        </select>
        <select>
            <option>Year</option>
            <option>2000</option>
            <option>2001</option>
        </select>
    </div>

    <label>Gender</label>
    <div class="gender">
        <label><input type="radio" name="gender" required> Male</label>
        <label><input type="radio" name="gender"> Female</label>
        <label><input type="radio" name="gender"> Custom</label>
    </div>

    <button type="submit">Sign Up</button>
</form>
